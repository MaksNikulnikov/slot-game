name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  docker:
    name: Build and smoke test Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t pixi-slot-game .

      - name: Smoke test playable container
        run: |
          set -euo pipefail

          docker run --detach --rm --name pixi-slot-game-ci --publish 8080:80 pixi-slot-game

          cleanup() {
            docker logs pixi-slot-game-ci || true
            docker stop pixi-slot-game-ci || true
          }
          trap cleanup EXIT

          fetch() {
            local url="$1"
            local output="$2"

            for attempt in {1..10}; do
              if curl --fail --silent --show-error "$url" --output "$output"; then
                return 0
              fi

              if [ "$attempt" -eq 10 ]; then
                echo "Failed to fetch ${url}."
                return 1
              fi

              sleep 1
            done
          }

          for attempt in {1..30}; do
            if fetch http://127.0.0.1:8080/ /tmp/index.html; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Playable container did not become ready in time."
              exit 1
            fi

            sleep 1
          done

          grep --quiet "Lucky Reels" /tmp/index.html

          main_bundle="$(grep --only-matching --extended-regexp 'assets/main\.[^"]+\.js' /tmp/index.html | head --lines 1)"
          test -n "$main_bundle"

          fetch "http://127.0.0.1:8080/${main_bundle}" /tmp/main.js
          fetch http://127.0.0.1:8080/favicon.png /tmp/favicon.png
          fetch http://127.0.0.1:8080/assets/background.svg /tmp/background.svg
          fetch http://127.0.0.1:8080/assets/atlases/slot-symbols.json /tmp/slot-symbols.json
          fetch http://127.0.0.1:8080/assets/atlases/slot-symbols.png /tmp/slot-symbols.png
          fetch http://127.0.0.1:8080/assets/atlases/slot-machine.json /tmp/slot-machine.json
          fetch http://127.0.0.1:8080/assets/atlases/slot-machine.png /tmp/slot-machine.png
          fetch http://127.0.0.1:8080/assets/audio/music/crystal_cave_theme_loop.mp3 /tmp/background-loop.mp3
          fetch http://127.0.0.1:8080/assets/audio/sfx/ui_click.ogg /tmp/ui-click.ogg
          fetch http://127.0.0.1:8080/assets/audio/sfx/win_level.ogg /tmp/win-level.ogg
          fetch http://127.0.0.1:8080/assets/spine/spineboy-pro.skel /tmp/spineboy-pro.skel
          fetch http://127.0.0.1:8080/assets/spine/spineboy-pma.atlas /tmp/spineboy-pma.atlas
          fetch http://127.0.0.1:8080/assets/spine/spineboy-pma.png /tmp/spineboy-pma.png
